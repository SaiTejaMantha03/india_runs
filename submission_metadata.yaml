# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude , Chatgpt" 
  

ai_usage_summary: |
  Used Claude extensively for: exploratory data analysis of the released
  	candidates.jsonl (title/skill frequency distributions, honeypot pattern
  	discovery), drafting and iterating on the scoring modules (title
  	taxonomy, skill taxonomy, anomaly detection, behavioral signal scoring),
  	and authoring documentation. All empirical claims underlying the scoring
  	weights were independently verified by running the corresponding
  	analysis scripts against the actual dataset, not asserted from model
  	priors. No candidate data was sent to any external hosted LLM API as
  	part of the ranking pipeline itself (the ranker is offline, rule-based,
  	and has zero network calls at ranking time -- see compute.has_network_during_ranking).
  
  Used Chatgpt to Understand the key points that needed to be kept in mind while developing the Ranker.
  	it is mainly used to analyze the candidate dataset, job description, redrob signals , to understand what needs to be build.
  	By keeping the constraints in mind we have understood the actual problem we are solving.
  

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based, fully transparent ranker. No embeddings, no hosted LLM calls.
  Score = weighted sum of title relevance (0.40), skill match discounted
  by career-history corroboration (0.30), experience-band fit (0.15), and
  a career-evidence bonus implementing the JD's "Tier 5 hidden gem"
  instruction (0.15) -- multiplied by three penalty stages: JD-specific
  disqualifiers (title-chasers, consulting-only, CV-only, architecture-
  only, recent-LangChain-only), honeypot/anomaly defenses, and a
  behavioral-signal/location availability multiplier.

  Key empirical finding driving the design: the 13 titles that read as
  the closest semantic match to the JD (Senior AI Engineer, Staff ML
  Engineer, Recommendation Systems Engineer, etc.) comprise exactly 179
  candidates in the released pool, and 100% of them carry >=2 simultaneous
  "expert"-proficiency skills with verified internal impossibilities
  (skill duration exceeding total career-history length). This entire
  title bucket is a honeypot population. Real signal lives in a separate,
  larger pool of ML-adjacent-but-not-suspiciously-perfect titles (Data
  Scientist, ML Engineer, AI Specialist, Senior Software Engineer (ML),
  etc.), verified to have 0% expert-skill rate and internally consistent
  profiles. Result: 0% honeypot rate in our top-100 vs. 48-76% on three
  naive reference rankings we audited before finalizing this approach.

  Runtime ~65 seconds, ~1.7GB peak RAM, on the full 100K-candidate pool,
  CPU-only, zero network calls.

